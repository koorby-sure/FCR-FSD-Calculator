/* ДОБАВЬ в самый конец <style>, чтобы переопределить старый дизайн справочника */

.guide {
  background: #ffffff;
}

.guide-content {
  margin-top: 16px;
}

.guide-hero {
  display: none;
}

.guide-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 0;
}

.guide-card {
  padding: 16px;
  border: 1px solid rgba(226, 232, 240, .95);
  border-radius: 18px;
  background:
    linear-gradient(180deg, #ffffff, #f8fafc);
  box-shadow: none;
}

.guide-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.guide-step {
  width: auto;
  min-width: 44px;
  height: 30px;
  display: inline-grid;
  place-items: center;
  margin: 0;
  padding: 0 10px;
  border-radius: 999px;
  background: #eff6ff;
  color: #1d4ed8;
  font-size: 12px;
  font-weight: 950;
  letter-spacing: .02em;
}

.guide-card h4 {
  margin: 0;
  font-size: 17px;
  letter-spacing: -.02em;
}

.guide-card p {
  margin: 0 0 10px;
  color: #64748b;
  font-size: 14px;
  line-height: 1.42;
}

.guide-card ul {
  margin: 0;
  padding-left: 18px;
  color: #0b1f3a;
  font-size: 14px;
  line-height: 1.55;
}

.guide-flow {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 12px;
  padding: 12px;
  border: 1px solid rgba(226, 232, 240, .95);
  border-radius: 18px;
  background: #f8fafc;
}

.flow-item {
  padding: 12px;
  border-radius: 15px;
  background: #ffffff;
  border: 1px solid rgba(226, 232, 240, .95);
}

.flow-item span {
  display: block;
  font-size: 16px;
  font-weight: 950;
  letter-spacing: -.02em;
}

.flow-item small {
  display: block;
  margin-top: 4px;
  color: #64748b;
  font-size: 13px;
}

.flow-arrow {
  display: none;
  align-items: center;
  justify-content: center;
  color: #2563eb;
  font-size: 20px;
  font-weight: 950;
}

.guide-notes {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 12px;
}

.guide-notes > div {
  padding: 14px;
  border-radius: 16px;
  background: #ffffff;
  border: 1px solid rgba(226, 232, 240, .95);
}

.guide-notes h4 {
  margin: 0 0 5px;
  font-size: 15px;
  letter-spacing: -.02em;
}

.guide-notes p {
  color: #64748b;
  font-size: 14px;
  line-height: 1.4;
}

@media (min-width: 720px) {
  .guide-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .guide-flow {
    grid-template-columns: 1fr 40px 1fr 40px 1fr;
    align-items: stretch;
  }

  .flow-arrow {
    display: flex;
  }

  .guide-notes {
    grid-template-columns: repeat(3, 1fr);
  }
}
